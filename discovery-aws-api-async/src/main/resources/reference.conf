######################################################
# Apache Pekko Service Discovery AWS Config          #
######################################################

pekko.discovery {
  # Set the following in your application.conf if you want to use this discovery mechanism:
  # method = aws-api-ec2-tag-based-async
  # ApiMayChange
  aws-api-ec2-tag-based-async {

    class = org.apache.pekko.discovery.awsapi.ec2.AsyncEc2TagBasedServiceDiscovery

    # FQCN of a class that implements AwsAsyncClientConfigCustomizer with either a no-argument
    # constructor or a single-argument constructor that takes an ExtendedActorSystem.
    # The customizer is applied after the default retry strategy is set, so it can override it.
    client-config = ""

    # AWS region to use. If empty, the default region provider chain is used.
    region = ""

    tag-key = "service"

    # filters have to be in key=value format, separated by semi-colon
    filters = ""

    # If you want multiple Pekko nodes (i.e. JVMs) per EC2 instance, set the following
    # to the list of Pekko Management port numbers
    ports = []

  }

  # Set the following in your application.conf if you want to use this discovery mechanism:
  # method = aws-api-ecs-async
  # ApiMayChange
  aws-api-ecs-async {

    class = org.apache.pekko.discovery.awsapi.ecs.AsyncEcsServiceDiscovery

    cluster = "default"

    # FQCN of a class that implements AwsAsyncClientConfigCustomizer with either a no-argument
    # constructor or a single-argument constructor that takes an ExtendedActorSystem.
    # The customizer is applied after the default retry strategy is set, so it can override it.
    client-config = ""

    # AWS region to use. If empty, the default region provider chain is used.
    region = ""

    # Example: [{ key = "deployment-side", value = "blue" }, ...]
    tags = []

  }

  aws-api-ecs-task-set-async {

    class = org.apache.pekko.discovery.awsapi.ecs.AsyncEcsTaskSetDiscovery

    cluster = "default"

    # FQCN of a class that implements AwsAsyncClientConfigCustomizer with either a no-argument
    # constructor or a single-argument constructor that takes an ExtendedActorSystem.
    # The customizer is applied after the default retry strategy is set, so it can override it.
    client-config = ""

    # AWS region to use. If empty, the default region provider chain is used.
    region = ""

  }
}
